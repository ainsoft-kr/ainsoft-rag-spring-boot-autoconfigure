<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ainsoft RAG Admin Provider History</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body data-page="provider-history">
    <main>
      <section class="hero">
        <div class="hero-top">
          <div>
            <span class="eyebrow">Provider History</span>
            <h1>Provider Settings &amp; Health History</h1>
            <p class="lead">
              현재 provider 상태와 최근 이력, fallback 이벤트를 조회합니다.
            </p>
          </div>
          <div class="badge-row">
            <span class="badge" id="badge-base"></span>
            <span class="badge" id="badge-api"></span>
            <span class="badge" id="badge-window"></span>
            <span class="badge" id="badge-role"></span>
          </div>
        </div>

        <nav class="nav-menu"></nav>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Query Options</h2>
              <p>recent provider window와 이력 길이를 조절합니다.</p>
            </div>
          </div>
          <div class="stack">
            <div class="dual">
              <label>
                Recent Provider Window (ms)
                <input data-context="recentProviderWindowMillis" type="number" value="60000" />
              </label>
              <label>
                History Limit
                <input id="provider-limit" type="number" value="120" />
              </label>
            </div>
            <div class="actions">
              <button id="btn-provider-refresh">Refresh Provider History</button>
            </div>
            <div class="notice" id="provider-notice"></div>
          </div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>History Tables</h2>
              <p>provider 샘플과 fallback 이벤트를 표로 보여 줍니다.</p>
            </div>
          </div>
          <div class="stack">
            <div id="provider-history-table"></div>
            <div id="provider-fallbacks-table"></div>
          </div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>Outputs</h2>
              <p>현재 health와 provider history 응답 전문입니다.</p>
            </div>
          </div>
          <div class="grid">
            <div class="stack">
              <strong>Provider Health</strong>
              <pre id="output-provider-health">{}</pre>
            </div>
            <div class="stack">
              <strong>Provider History</strong>
              <pre id="output-provider-history">{}</pre>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script>
      window.RAG_ADMIN_CONFIG = __RAG_ADMIN_CONFIG__;
    </script>
    <script src="assets/app.js"></script>
  </body>
</html>
