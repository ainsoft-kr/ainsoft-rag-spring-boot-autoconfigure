<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ainsoft RAG Admin File Ingest</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body data-page="file-ingest">
    <main>
      <section class="hero">
        <div class="hero-top">
          <div>
            <span class="eyebrow">File Ingest</span>
            <h1>RAG Admin Console</h1>
            <p class="lead">
              txt, pdf, docx, pptx 업로드 기반 색인 페이지입니다. 업로드 결과는 Job History에서 함께 추적됩니다.
            </p>
          </div>
          <div class="badge-row">
            <span class="badge" id="badge-base"></span>
            <span class="badge" id="badge-api"></span>
            <span class="badge" id="badge-window"></span>
            <span class="badge" id="badge-role"></span>
          </div>
        </div>

        <nav class="nav-menu"></nav>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Workspace Context</h2>
              <p>업로드 대상 tenant를 공통 컨텍스트에서 관리합니다.</p>
            </div>
          </div>
          <div class="dual">
            <label>
              Tenant ID
              <input data-context="tenantId" value="tenant-admin" />
            </label>
            <label>
              Recent Provider Window (ms)
              <input data-context="recentProviderWindowMillis" type="number" value="60000" />
            </label>
          </div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>File Ingest Form</h2>
              <p>파일 업로드를 통해 문서를 색인합니다.</p>
            </div>
          </div>
          <div class="stack">
            <div class="dual">
              <label>
                Upload Doc ID
                <input id="upload-doc-id" value="admin-upload-001" />
              </label>
              <label>
                Upload ACL
                <input id="upload-acl" value="group:admin" />
              </label>
            </div>
            <label>
              Upload Metadata (`key=value`)
              <textarea id="upload-metadata">surface=upload</textarea>
            </label>
            <label>
              File
              <input id="upload-file" type="file" />
            </label>
            <div class="actions">
              <button id="btn-upload">Upload File</button>
            </div>
            <div class="notice" id="upload-notice"></div>
          </div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>Output</h2>
              <p>파일 ingest 응답을 JSON으로 표시합니다.</p>
            </div>
          </div>
          <pre id="output-upload">{}</pre>
        </article>
      </section>
    </main>

    <script>
      window.RAG_ADMIN_CONFIG = __RAG_ADMIN_CONFIG__;
    </script>
    <script src="assets/app.js"></script>
  </body>
</html>
