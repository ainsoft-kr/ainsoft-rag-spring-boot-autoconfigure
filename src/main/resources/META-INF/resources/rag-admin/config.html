<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ainsoft RAG Admin Config Inspector</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body data-page="config">
    <main>
      <section class="hero">
        <div class="hero-top">
          <div>
            <span class="eyebrow">Config Inspector</span>
            <h1>Config Inspector</h1>
            <p class="lead">
              현재 적용된 rag.* 및 admin 설정을 읽기 전용으로 확인합니다.
            </p>
          </div>
          <div class="badge-row">
            <span class="badge" id="badge-base"></span>
            <span class="badge" id="badge-api"></span>
            <span class="badge" id="badge-window"></span>
            <span class="badge" id="badge-role"></span>
          </div>
        </div>

        <nav class="nav-menu"></nav>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Read Only</h2>
              <p>민감한 key/token 값은 마스킹된 상태로 노출됩니다.</p>
            </div>
          </div>
          <div class="stack">
            <div class="actions">
              <button id="btn-config-refresh">Refresh Config</button>
            </div>
            <div class="notice" id="config-notice"></div>
          </div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>Output</h2>
              <p>설정 응답 전문입니다.</p>
            </div>
          </div>
          <pre id="output-config">{}</pre>
        </article>
      </section>
    </main>

    <script>
      window.RAG_ADMIN_CONFIG = __RAG_ADMIN_CONFIG__;
    </script>
    <script src="assets/app.js"></script>
  </body>
</html>
