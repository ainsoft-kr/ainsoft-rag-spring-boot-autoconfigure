<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ainsoft RAG Admin Text Ingest</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body data-page="text-ingest">
    <main>
      <section class="hero">
        <div class="hero-top">
          <div>
            <span class="eyebrow">Text Ingest</span>
            <h1>RAG Admin Console</h1>
            <p class="lead">
              텍스트 본문을 직접 입력해 upsert하는 페이지입니다. 성공/실패 이력은 Job History에서 확인합니다.
            </p>
          </div>
          <div class="badge-row">
            <span class="badge" id="badge-base"></span>
            <span class="badge" id="badge-api"></span>
            <span class="badge" id="badge-window"></span>
            <span class="badge" id="badge-role"></span>
          </div>
        </div>

        <nav class="nav-menu"></nav>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Workspace Context</h2>
              <p>문서를 넣을 tenant를 공통 컨텍스트에서 관리합니다.</p>
            </div>
          </div>
          <div class="dual">
            <label>
              Tenant ID
              <input data-context="tenantId" value="tenant-admin" />
            </label>
            <label>
              Recent Provider Window (ms)
              <input data-context="recentProviderWindowMillis" type="number" value="60000" />
            </label>
          </div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Text Ingest Form</h2>
              <p>텍스트 문서를 직접 색인합니다.</p>
            </div>
          </div>
          <div class="stack">
            <div class="dual">
              <label>
                Doc ID
                <input id="ingest-doc-id" value="admin-note-001" />
              </label>
              <label>
                ACL
                <input id="ingest-acl" value="group:admin" />
              </label>
            </div>
            <label>
              Metadata (`key=value`)
              <textarea id="ingest-metadata">surface=admin
category=notes</textarea>
            </label>
            <label>
              Text
              <textarea id="ingest-text">Ainsoft RAG admin console document.</textarea>
            </label>
            <div class="actions">
              <button id="btn-ingest">Ingest Text</button>
            </div>
            <div class="notice" id="ingest-notice"></div>
          </div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>Output</h2>
              <p>텍스트 ingest 응답을 JSON으로 표시합니다.</p>
            </div>
          </div>
          <pre id="output-ingest">{}</pre>
        </article>
      </section>
    </main>

    <script>
      window.RAG_ADMIN_CONFIG = __RAG_ADMIN_CONFIG__;
    </script>
    <script src="assets/app.js"></script>
  </body>
</html>
