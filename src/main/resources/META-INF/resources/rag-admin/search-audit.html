<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ainsoft RAG Admin Search Audit</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body data-page="search-audit">
    <main class="dashboard-shell">
      <aside class="sidebar">
        <section class="brand"><span class="brand-mark">RA</span><div><div class="brand-title">RAG Admin</div></div></section>
        <nav class="nav-menu"></nav>
      </aside>

      <section class="content-area">
        <section class="grid">
          <article class="panel">
            <div class="panel-header"><div><h2>Audit Query</h2><p>최근 검색 감사 로그를 지정한 길이만큼 불러옵니다.</p></div></div>
            <div class="stack">
              <label>Limit<input id="audit-limit" type="number" value="100" /></label>
              <div class="actions"><button id="btn-audit-refresh">Refresh Search Audit</button></div>
              <div class="notice" id="audit-notice"></div>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header"><div><h2>Audit Summary</h2><p>검색 성공량, fallback, topK 경향을 요약 카드로 보여 줍니다.</p></div></div>
            <div class="analytic-grid" id="audit-analytics"></div>
            <div id="audit-bars"></div>
          </article>

          <article class="panel full">
            <div class="panel-header"><div><h2>Audit Table</h2><p>검색 타입, tenant, 결과 수, fallback 여부를 표로 확인합니다.</p></div></div>
            <div id="audit-table"></div>
          </article>

          <article class="panel full">
            <div class="panel-header"><div><h2>Output</h2><p>search audit 응답 전문입니다.</p></div></div>
            <pre id="output-search-audit">{}</pre>
          </article>
        </section>
      </section>
    </main>

    <script>window.RAG_ADMIN_CONFIG = __RAG_ADMIN_CONFIG__;</script>
    <script src="assets/app.js"></script>
  </body>
</html>
