<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ainsoft RAG Admin Bulk Operations</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body data-page="bulk-operations">
    <main>
      <section class="hero">
        <div class="hero-top">
          <div>
            <span class="eyebrow">Bulk Operations</span>
            <h1>Bulk Operations</h1>
            <p class="lead">
              다건 텍스트 ingest, 다건 삭제, metadata 일괄 수정 작업을 제공합니다.
            </p>
          </div>
          <div class="badge-row">
            <span class="badge" id="badge-base"></span>
            <span class="badge" id="badge-api"></span>
            <span class="badge" id="badge-window"></span>
            <span class="badge" id="badge-role"></span>
          </div>
        </div>

        <nav class="nav-menu"></nav>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Bulk Text Ingest</h2>
              <p>문서 배열 JSON을 넣어 여러 문서를 한 번에 색인합니다.</p>
            </div>
          </div>
          <div class="stack">
            <label>
              Tenant ID
              <input data-context="tenantId" value="tenant-admin" />
            </label>
            <label>
              Documents JSON
              <textarea id="bulk-ingest-json">[
  {
    "docId": "bulk-001",
    "text": "bulk sample document",
    "acl": ["group:admin"],
    "metadata": {
      "surface": "bulk"
    }
  }
]</textarea>
            </label>
            <div class="actions">
              <button id="btn-bulk-ingest">Run Bulk Text Ingest</button>
            </div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>Bulk Delete / Metadata Patch</h2>
              <p>쉼표 또는 줄바꿈으로 doc id를 입력합니다.</p>
            </div>
          </div>
          <div class="stack">
            <label>
              Delete Doc IDs
              <textarea id="bulk-delete-docs">bulk-001</textarea>
            </label>
            <div class="actions">
              <button class="secondary" id="btn-bulk-delete">Run Bulk Delete</button>
            </div>
            <label>
              Patch Doc IDs
              <textarea id="bulk-patch-docs">bulk-001</textarea>
            </label>
            <label>
              Patch Metadata (`key=value`)
              <textarea id="bulk-patch-metadata">surface=patched</textarea>
            </label>
            <div class="actions">
              <button id="btn-bulk-patch">Run Metadata Patch</button>
            </div>
            <div class="notice" id="bulk-notice"></div>
          </div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>Output</h2>
              <p>bulk 작업 응답 전문입니다.</p>
            </div>
          </div>
          <pre id="output-bulk">{}</pre>
        </article>
      </section>
    </main>

    <script>
      window.RAG_ADMIN_CONFIG = __RAG_ADMIN_CONFIG__;
    </script>
    <script src="assets/app.js"></script>
  </body>
</html>
