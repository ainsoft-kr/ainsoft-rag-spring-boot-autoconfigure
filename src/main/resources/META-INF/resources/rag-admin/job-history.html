<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ainsoft RAG Admin Job History</title>
    <link rel="stylesheet" href="assets/app.css" />
  </head>
  <body data-page="job-history">
    <main>
      <section class="hero">
        <div class="hero-top">
          <div>
            <span class="eyebrow">Job History</span>
            <h1>Job History</h1>
            <p class="lead">
              ingest/upload/운영 작업 이력과 상태, 재시도 가능한 작업을 조회합니다.
            </p>
          </div>
          <div class="badge-row">
            <span class="badge" id="badge-base"></span>
            <span class="badge" id="badge-api"></span>
            <span class="badge" id="badge-window"></span>
            <span class="badge" id="badge-role"></span>
          </div>
        </div>

        <nav class="nav-menu"></nav>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>History Query</h2>
              <p>최근 job history를 조회하고 실패 작업을 재시도합니다.</p>
            </div>
          </div>
          <div class="stack">
            <label>
              Limit
              <input id="job-limit" type="number" value="100" />
            </label>
            <div class="actions">
              <button id="btn-job-refresh">Refresh Job History</button>
            </div>
            <div class="notice" id="job-notice"></div>
          </div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>Job Table</h2>
              <p>job별 상태와 retry 가능 여부를 확인합니다.</p>
            </div>
          </div>
          <div id="job-table"></div>
        </article>

        <article class="panel full">
          <div class="panel-header">
            <div>
              <h2>Outputs</h2>
              <p>job history 응답과 retry 응답을 JSON으로 표시합니다.</p>
            </div>
          </div>
          <div class="grid">
            <div class="stack">
              <strong>Job History</strong>
              <pre id="output-job-history">{}</pre>
            </div>
            <div class="stack">
              <strong>Retry Action</strong>
              <pre id="output-job-action">{}</pre>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script>
      window.RAG_ADMIN_CONFIG = __RAG_ADMIN_CONFIG__;
    </script>
    <script src="assets/app.js"></script>
  </body>
</html>
